<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>AI Adoption Dashboard · LISER</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.css"
    />
    <style>
      :root { --navy: #000070; --cyan: #00AEEF; --red: #E30613; --ink: #283137; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #fbfcfd; color: var(--ink);
      }
      #root { display: none; height: 100vh; }

      /* ---- Password gate ---- */
      #gate {
        position: fixed; inset: 0; z-index: 1000;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(120deg, #000070 0%, #14148e 55%, #1d1da3 100%);
      }
      .gate-card {
        width: min(92vw, 420px); background: #fff; border-radius: 14px;
        padding: 34px 32px 28px; box-shadow: 0 18px 50px rgba(0, 0, 40, 0.35);
        text-align: center;
      }
      .gate-card h1 {
        color: var(--navy); font-size: 1.35rem; font-weight: 800;
        margin: 14px 0 2px; letter-spacing: 0.2px;
      }
      .gate-accent {
        height: 4px; width: 64px; margin: 0 auto 16px; border-radius: 3px;
        background: linear-gradient(90deg, var(--navy) 0%, var(--red) 50%, var(--cyan) 100%);
      }
      .gate-card p { color: #61737b; font-size: 0.92rem; margin: 6px 0 20px; }
      .gate-card input[type="password"] {
        width: 100%; padding: 12px 14px; font-size: 1rem; color: var(--ink);
        border: 1px solid #c7d0d8; border-radius: 9px; outline: none;
      }
      .gate-card input[type="password"]:focus { border-color: var(--navy); }
      .gate-card button {
        margin-top: 14px; width: 100%; padding: 12px 14px; font-size: 1rem;
        font-weight: 700; color: #fff; background: var(--navy); border: 0;
        border-radius: 9px; cursor: pointer;
      }
      .gate-card button:hover { background: #14148e; }
      #gate-error {
        display: none; color: var(--red); font-size: 0.86rem; margin-top: 12px;
      }
      .gate-foot { margin-top: 22px; color: #9aa6ad; font-size: 0.72rem; }
      #boot {
        position: fixed; inset: 0; display: none; align-items: center;
        justify-content: center; flex-direction: column; gap: 14px;
        background: #fbfcfd; color: #61737b; font-size: 0.95rem; z-index: 5;
      }
      .spinner {
        width: 30px; height: 30px; border: 3px solid #d7e6f3;
        border-top-color: var(--navy); border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Password gate (client-side; obscurity + a shared password, not strong
         access control — the data files are static and individually fetchable). -->
    <div id="gate">
      <div class="gate-card">
        <div class="gate-accent"></div>
        <h1>AI Adoption Dashboard</h1>
        <p>This dashboard is private. Please enter the access password.</p>
        <form id="gate-form" autocomplete="off">
          <input id="gate-pw" type="password" placeholder="Password" autofocus />
          <button type="submit">Enter</button>
        </form>
        <div id="gate-error">Incorrect password — please try again.</div>
        <div class="gate-foot">LISER · Luxembourg Institute of Socio-Economic Research</div>
      </div>
    </div>

    <div id="boot">
      <div class="spinner"></div>
      <div>Loading the dashboard… first load fetches the Python runtime and may take ~20–40&nbsp;s.</div>
    </div>

    <div id="root"></div>

    <script type="module">
      // SHA-256 of the access password. To change it:
      //   printf '%s' 'your-new-password' | sha256sum
      // and paste the hex digest below.
      const PASSWORD_SHA256 =
        "a85ab0d49d52e7a8ac20478434772d1c3a1bd164004a3d1914c27e8d6f62fefd";
      const SESSION_KEY = "aidash_auth";
      const STLITE =
        "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.js";

      async function sha256(text) {
        const buf = await crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(text),
        );
        return [...new Uint8Array(buf)]
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      let launched = false;
      async function launch() {
        if (launched) return;
        launched = true;
        document.getElementById("gate").style.display = "none";
        document.getElementById("boot").style.display = "flex";
        const root = document.getElementById("root");
        root.style.display = "block";
        const { mount } = await import(STLITE);
        const files = await (
          await fetch("./files.json", { cache: "no-cache" })
        ).json();
        mount(
          {
            requirements: ["plotly", "pandas", "numpy"],
            entrypoint: "app.py",
            files,
          },
          root,
        );
        // stlite renders into #root; hide our boot overlay shortly after.
        setTimeout(() => (document.getElementById("boot").style.display = "none"), 4000);
      }

      if (sessionStorage.getItem(SESSION_KEY) === "1") {
        launch();
      } else {
        document.getElementById("gate-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const pw = document.getElementById("gate-pw").value;
          if ((await sha256(pw)) === PASSWORD_SHA256) {
            sessionStorage.setItem(SESSION_KEY, "1");
            launch();
          } else {
            document.getElementById("gate-error").style.display = "block";
            document.getElementById("gate-pw").value = "";
            document.getElementById("gate-pw").focus();
          }
        });
      }
    </script>
  </body>
</html>
